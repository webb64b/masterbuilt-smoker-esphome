# Example ESPHome configuration for a Masterbuilt Bluetooth electric smoker.
#
# Before flashing:
#   1. Put your Wi-Fi credentials in a secrets.yaml next to this file:
#        wifi_ssid: "your-network"
#        wifi_password: "your-password"
#   2. Flash once over USB, then put the smoker in pairing mode for first-time setup.
#      After that it reconnects on its own (the identity is saved to flash).

esphome:
  name: masterbuilt-smoker
  friendly_name: Masterbuilt Smoker
  min_version: 2026.6.2

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Pull the smoker component straight from GitHub.
external_components:
  - source: github://webb64b/masterbuilt-smoker-esphome
    components: [masterbuilt_smoker]

# The smoker uses a plain, unencrypted BLE link (no bonding).
esp32_ble:
  io_capability: none

esp32_ble_tracker:
  scan_parameters:
    interval: 150ms
    window: 60ms
    active: true
    continuous: true

ble_client:
  # ESPHome requires a BLE client address in YAML. The component replaces this placeholder
  # at runtime after it discovers the smoker's 0x4842 manufacturer advertisement.
  - mac_address: 00:00:00:00:00:00
    id: smoker_client
    auto_connect: false

masterbuilt_smoker:
  id: smoker
  ble_client_id: smoker_client
  # Optional: uncomment this if more than one compatible smoker is in Bluetooth range.
  # smoker_mac: BC:33:AC:E0:E1:27
  chamber_temperature:
    name: "Chamber Temperature"
  target_temperature:
    name: "Target Temperature"
  cook_time:
    name: "Cook Time"
  time_remaining:
    name: "Time Remaining"
  forget_pairing:
    name: "Forget Saved Smoker Pairing"
  probe_1:
    name: "Meat Probe 1"
  probe_2:
    name: "Meat Probe 2"
  probe_3:
    name: "Meat Probe 3"
  probe_4:
    name: "Meat Probe 4"
